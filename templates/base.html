<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}MarlinSpike{% endblock %}</title>
<style>
@font-face {
  font-family: 'Inter';
  font-style: normal;
  font-weight: 400 700;
  font-display: swap;
  src: url(/static/fonts/inter-latin.woff2) format('woff2');
}
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url(/static/fonts/fira-code-latin.woff2) format('woff2');
}
:root {
  --bg: #0f1923;
  --bg-deep: #0b1420;
  --bg-surface: #111b2b;
  --panel: #162233;
  --panel-alt: #111b2b;
  --border: #243447;
  --border-dim: #141e32;
  --text: #d4dce6;
  --text-dim: #7a8a9e;
  --text-muted: #384560;
  --accent: #5b8af0;
  --accent-hover: #4a75d4;
  --accent-dim: rgba(91,138,240,0.08);
  --accent-cyan: #32b8c6;
  --accent-green: #3aad6b;
  --accent-rose: #c75070;
  --color-danger: #ef4444;
  --color-warning: #f59e0b;
  --color-success: #22c55e;
  --font-mono: 'Fira Code','Cascadia Code','Consolas','Courier New', monospace;
  --font-ui: 'Inter','Segoe UI', system-ui, -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav bar ── */
.ms-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 48px;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-dim);
  position: sticky;
  top: 0;
  z-index: 100;
}
.ms-nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.95em;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
}
.ms-nav-brand .brand-text { color: var(--color-danger); }
.ms-nav-brand .brand-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 5px;
  background: var(--bg-deep);
  border: 1.5px solid #ef444488;
  font-size: 0.62em;
  font-weight: 800;
  color: #ef4444;
  letter-spacing: -0.5px;
  flex-shrink: 0;
  box-shadow: 0 0 8px rgba(239,68,68,0.2);
  text-shadow: 0 0 6px rgba(239,68,68,0.5);
  position: relative;
}
.ms-nav-brand .brand-icon::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 6px;
  background: linear-gradient(135deg, rgba(239,68,68,0.25) 0%, transparent 40%, rgba(91,138,240,0.20) 100%);
  pointer-events: none;
}
.ms-nav-version {
  font-size: 0.68em;
  font-weight: 400;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.ms-nav-links {
  display: flex;
  gap: 2px;
  margin-left: 16px;
  height: 100%;
  align-items: stretch;
}
.ms-nav-links a {
  display: flex;
  align-items: center;
  padding: 0 14px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.85em;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.ms-nav-links a:hover { color: var(--text); }
.ms-nav-links a.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}
.ms-nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.85em;
  color: var(--text-dim);
}
.ms-nav-right a {
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.ms-nav-right a:hover { color: var(--text); background: var(--bg-surface); }
.ms-nav-user {
  font-family: var(--font-mono);
  font-size: 0.88em;
  color: var(--text-dim);
  padding: 3px 10px;
  background: var(--bg-surface);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
}

/* ── Content wrapper ── */
.ms-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--panel-alt);
  color: var(--text);
  font-size: 0.85em;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-ui);
  transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: var(--accent); background: var(--bg-surface); }
.btn-primary { border-color: var(--accent); background: rgba(91,138,240,0.12); color: var(--accent); }
.btn-primary:hover { background: rgba(91,138,240,0.2); }
.btn-danger { border-color: var(--color-danger); color: var(--color-danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { border-color: var(--color-success); color: var(--color-success); }
.btn-success:hover { background: rgba(34,197,94,0.1); }
.btn-sm { padding: 4px 10px; font-size: 0.82em; }

/* ── Panels ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  margin-bottom: 16px;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-dim);
}
.panel-header h2 {
  font-size: 0.88em;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.panel-body { padding: 16px; }

/* ── Tables ── */
.ms-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
.ms-table th {
  text-align: left;
  padding: 8px 12px;
  color: var(--text-muted);
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.ms-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-dim);
}
.ms-table tr:last-child td { border-bottom: none; }
.ms-table tr:hover td { background: rgba(91,138,240,0.02); }
.ms-table .mono { font-family: var(--font-mono); font-size: 0.92em; }
.ms-table .dim { color: var(--text-dim); }

/* ── Loading spinner ── */
@keyframes ms-spin { to { transform: rotate(360deg); } }
.ms-spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: ms-spin 0.7s linear infinite;
  vertical-align: middle;
}
.ms-spinner--sm { width: 14px; height: 14px; border-width: 1.5px; }
.ms-spinner--lg { width: 28px; height: 28px; border-width: 3px; }
.ms-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 24px;
  color: var(--text-dim);
  font-size: 0.85em;
}

/* ── Toast ── */
.ms-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 0.85em;
  z-index: 2000;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  max-width: 420px;
  line-height: 1.5;
}
.ms-toast.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.ms-toast.error { border-left-color: var(--color-danger); }
.ms-toast.success { border-left-color: var(--color-success); }
.ms-toast.warning { border-left-color: var(--color-warning); }
.ms-toast-icon {
  flex-shrink: 0;
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  line-height: 1;
}
.ms-toast-body { flex: 1; }

/* ── Form inputs ── */
.ms-input {
  padding: 7px 10px;
  background: var(--panel-alt);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.9em;
}
.ms-input { transition: border-color 0.15s; }
.ms-input:focus { border-color: var(--accent); outline: none; }
.ms-select {
  padding: 7px 10px;
  background: var(--panel-alt);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.9em;
  transition: border-color 0.15s;
}
.ms-select:focus { border-color: var(--accent); outline: none; }

/* ── Empty states ── */
.ms-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
}
.ms-empty-icon {
  width: 48px; height: 48px;
  opacity: 0.35;
  color: var(--text-muted);
}
.ms-empty-title {
  font-size: 0.92em;
  font-weight: 600;
  color: var(--text-dim);
}
.ms-empty-sub {
  font-size: 0.82em;
  color: var(--text-muted);
  max-width: 340px;
  line-height: 1.5;
}
.ms-empty-action {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
  color: var(--accent);
  font-size: 0.84em;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
}
.ms-empty-action:hover { text-decoration: underline; }

/* ── Modal ── */
.ms-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  animation: ms-fade-in 0.15s ease;
}
.ms-modal-backdrop.open { display: flex; }
@keyframes ms-fade-in { from { opacity: 0; } to { opacity: 1; } }
.ms-modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  min-width: 340px;
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  animation: ms-modal-slide 0.2s ease;
}
@keyframes ms-modal-slide {
  from { transform: translateY(-12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.ms-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-dim);
}
.ms-modal-header h3 {
  font-size: 0.92em;
  font-weight: 600;
}
.ms-modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2em;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}
.ms-modal-close:hover { color: var(--text); background: var(--bg-surface); }
.ms-modal-body { padding: 20px; }
.ms-modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 20px;
  border-top: 1px solid var(--border-dim);
}

/* ── Status badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.72em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  font-family: var(--font-mono);
}
.badge-running { background: rgba(91,138,240,0.12); color: var(--accent); }
.badge-completed { background: rgba(34,197,94,0.12); color: var(--color-success); }
.badge-failed { background: rgba(239,68,68,0.12); color: var(--color-danger); }
.badge-stopped { background: rgba(100,116,139,0.12); color: var(--text-dim); }
.badge-interrupted { background: rgba(245,158,11,0.12); color: var(--color-warning); }
.badge-pending { background: rgba(100,116,139,0.12); color: var(--text-dim); }

/* ── Info hint tooltip ── */
.info-hint {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  border: 1px solid var(--text-muted);
  color: var(--text-muted);
  font-size: 0.7em;
  font-weight: 700;
  font-style: italic;
  font-family: Georgia, serif;
  cursor: help;
  vertical-align: middle;
  margin-left: 4px;
  flex-shrink: 0;
}
.info-hint:hover { border-color: var(--accent); color: var(--accent); }
.info-hint .info-tip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  padding: 8px 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-style: normal;
  font-weight: 400;
  line-height: 1.45;
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  z-index: 50;
  white-space: normal;
  pointer-events: none;
}
.info-hint:hover .info-tip { display: block; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .ms-nav { padding: 0 12px; gap: 8px; }
  .ms-nav-links { gap: 0; margin-left: 8px; overflow-x: auto; }
  .ms-nav-links a { padding: 0 8px; font-size: 0.78em; white-space: nowrap; }
  .ms-nav-right { gap: 6px; font-size: 0.78em; }
  .ms-nav-version { display: none; }
  .ms-content { padding: 12px; }
  .ms-table { font-size: 0.78em; }
  .ms-table th, .ms-table td { padding: 6px 8px; }
  .ms-modal { min-width: 0; margin: 12px; }
}
@media (max-width: 480px) {
  .ms-nav-links a { padding: 0 6px; font-size: 0.72em; }
  .ms-nav-right a:not(:last-child) { display: none; }
  .panel-header { padding: 10px 12px; }
  .panel-body { padding: 12px; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav class="ms-nav">
  <a href="/dashboard" class="ms-nav-brand">
    <div class="brand-icon">MS</div>
    <span class="brand-text">MarlinSpike</span>
    <span class="ms-nav-version">v{{ app_version }}</span>
  </a>
  <div class="ms-nav-links">
    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">Reports</a>
    <a href="/scans" class="{% if request.path == '/scans' %}active{% endif %}">Scans</a>
    <a href="/projects" class="{% if request.path == '/projects' %}active{% endif %}">Projects</a>
    <a href="/capabilities" class="{% if request.path == '/capabilities' %}active{% endif %}">Capabilities</a>
    {% if session.get('role') == 'admin' %}
    <a href="/users" class="{% if request.path == '/users' %}active{% endif %}">Users</a>
    <a href="/audit" class="{% if request.path == '/audit' %}active{% endif %}">Audit</a>
    <a href="/system" class="{% if request.path == '/system' %}active{% endif %}">System</a>
    {% endif %}
  </div>
  <div class="ms-nav-right">
    <a href="/about">About</a>
    <a href="/profile" class="{% if request.path == '/profile' %}active{% endif %}">{{ session.get('user', '') }}</a>
    <a href="/logout">Logout</a>
  </div>
</nav>

{% block body %}{% endblock %}

<div class="ms-toast" id="ms-toast">
  <span class="ms-toast-icon" id="ms-toast-icon"></span>
  <span class="ms-toast-body" id="ms-toast-body"></span>
</div>

<script>
/** Modal system — msModal.open(id), msModal.close(id) */
var msModal = (function() {
  function open(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add('open');
    el.addEventListener('click', _backdropClick);
    document.addEventListener('keydown', _escHandler);
    /* Focus first input inside modal */
    setTimeout(function() {
      var inp = el.querySelector('input:not([type=hidden]),select,textarea');
      if (inp) inp.focus();
    }, 50);
  }
  function close(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('open');
    el.removeEventListener('click', _backdropClick);
    document.removeEventListener('keydown', _escHandler);
  }
  function _backdropClick(e) {
    if (e.target.classList.contains('ms-modal-backdrop')) {
      e.target.classList.remove('open');
      e.target.removeEventListener('click', _backdropClick);
    }
  }
  function _escHandler(e) {
    if (e.key === 'Escape') {
      var open = document.querySelector('.ms-modal-backdrop.open');
      if (open) { close(open.id); }
    }
  }
  return { open: open, close: close };
})();
function msToast(msg, level) {
  var t = document.getElementById('ms-toast');
  var icon = document.getElementById('ms-toast-icon');
  var body = document.getElementById('ms-toast-body');
  /* backward compat: msToast('msg', true) still works as error */
  if (level === true) level = 'error';
  if (level === false || level === undefined) level = 'info';
  var icons = { info: '\u2139', success: '\u2713', warning: '\u26A0', error: '\u2717' };
  var cls = 'ms-toast visible';
  if (level === 'error') cls += ' error';
  else if (level === 'success') cls += ' success';
  else if (level === 'warning') cls += ' warning';
  icon.textContent = icons[level] || icons.info;
  body.textContent = msg;
  t.className = cls;
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.className = 'ms-toast'; }, 4000);
}
/** Generate spinner HTML for inline use: msSpinner() or msSpinner('sm') */
function msSpinner(size) {
  var cls = 'ms-spinner';
  if (size) cls += ' ms-spinner--' + size;
  return '<div class="' + cls + '"></div>';
}
/** Generate a loading placeholder row/div: msLoadingHTML('Loading reports...') */
function msLoadingHTML(msg, colspan) {
  if (colspan) return '<tr><td colspan="' + colspan + '"><div class="ms-loading">' + msSpinner() + ' ' + (msg || 'Loading\u2026') + '</div></td></tr>';
  return '<div class="ms-loading">' + msSpinner() + ' ' + (msg || 'Loading\u2026') + '</div>';
}
/** SVG empty-state icons keyed by name */
var _msEmptyIcons = {
  report: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="6" width="28" height="36" rx="3"/><line x1="17" y1="16" x2="31" y2="16"/><line x1="17" y1="22" x2="31" y2="22"/><line x1="17" y1="28" x2="25" y2="28"/></svg>',
  scan: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="24" r="14"/><path d="M24 14v10l7 7"/></svg>',
  project: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14h36v24a3 3 0 01-3 3H9a3 3 0 01-3-3V14z"/><path d="M6 14l4-7h14l4 7"/></svg>',
  file: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6h18l8 8v28a2 2 0 01-2 2H12a2 2 0 01-2-2V8a2 2 0 012-2z"/><polyline points="30 6 30 14 38 14"/></svg>',
  network: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="12" r="5"/><circle cx="12" cy="36" r="5"/><circle cx="36" cy="36" r="5"/><line x1="24" y1="17" x2="12" y2="31"/><line x1="24" y1="17" x2="36" y2="31"/><line x1="12" y1="36" x2="36" y2="36"/></svg>',
  user: '<svg class="ms-empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="16" r="8"/><path d="M8 42c0-8.837 7.163-16 16-16s16 7.163 16 16"/></svg>'
};
/**
 * Generate empty-state HTML.
 * msEmptyHTML({ icon:'report', title:'No reports yet', sub:'Run a scan...', action:'Start scan', href:'/dashboard' }, colspan)
 */
function msEmptyHTML(opts, colspan) {
  var icon = (opts.icon && _msEmptyIcons[opts.icon]) || '';
  var h = '<div class="ms-empty">' + icon;
  if (opts.title) h += '<div class="ms-empty-title">' + opts.title + '</div>';
  if (opts.sub) h += '<div class="ms-empty-sub">' + opts.sub + '</div>';
  if (opts.action) {
    if (opts.href) h += '<a class="ms-empty-action" href="' + opts.href + '">' + opts.action + ' &rarr;</a>';
    else if (opts.onclick) h += '<span class="ms-empty-action" onclick="' + opts.onclick + '">' + opts.action + ' &rarr;</span>';
  }
  h += '</div>';
  if (colspan) return '<tr><td colspan="' + colspan + '">' + h + '</td></tr>';
  return h;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
